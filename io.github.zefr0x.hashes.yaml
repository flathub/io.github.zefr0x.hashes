id: io.github.zefr0x.hashes
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
command: hashes
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
modules:
  - name: hashes
    buildsystem: meson
    config-opts:
      - --buildtype=release
    sources:
      - type: git
        url: https://github.com/zefr0x/hashes
        tag: v1.1.4
        commit: ed3c287ed271ccd34b254d6245be3d7115602584
        x-checker-data:
          type: git
          version-scheme: semantic
    modules:
      - python3-requirements.yaml
